<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挂件同步测试 - 页面C</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(120deg, #a8edea 0%, #fed6e3 50%, #d299c2 100%);
            background-size: 300% 300%;
            animation: gradientFlow 12s ease infinite;
            min-height: 100vh;
            color: #333;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            33% { background-position: 100% 50%; }
            66% { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        h1 {
            text-align: center;
            font-size: 2.3em;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(230, 126, 34, 0.9);
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            font-size: 14px;
            backdrop-filter: blur(10px);
            animation: bounce 1.5s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .multi-sync-demo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .sync-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .sync-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
        }
        
        .sync-card h3 {
            color: #8e44ad;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .sync-visual {
            background: rgba(142, 68, 173, 0.1);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
        
        .sync-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .sync-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: syncPulse 2s infinite;
        }
        
        .sync-dot.page-a { 
            background: #3498db; 
            animation-delay: 0s;
        }
        
        .sync-dot.page-b { 
            background: #e74c3c; 
            animation-delay: 0.5s;
        }
        
        .sync-dot.page-c { 
            background: #f39c12; 
            animation-delay: 1s;
        }
        
        @keyframes syncPulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        
        .navigation {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin: 30px 0;
        }
        
        .nav-link {
            background: linear-gradient(45deg, #8e44ad, #3498db);
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(142, 68, 173, 0.3);
        }
        
        .nav-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(142, 68, 173, 0.5);
        }
        
        .real-time-log {
            background: rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        
        .test-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: #333;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="status-indicator">
        🎯 页面C - 多页面同步
    </div>
    
    <div class="container">
        <h1>🎯 页面C - 多页面同步验证</h1>
        
        <div class="sync-visual">
            <h3>🔄 三页面同步状态</h3>
            <div class="sync-dots">
                <div class="sync-dot page-a" title="页面A"></div>
                <div class="sync-dot page-b" title="页面B"></div>
                <div class="sync-dot page-c" title="页面C"></div>
            </div>
            <p>三个圆点代表三个页面的同步状态</p>
        </div>
        
        <div class="multi-sync-demo">
            <div class="sync-card">
                <h3>🎪 多页面测试优势</h3>
                <ul>
                    <li>验证复杂同步场景</li>
                    <li>测试网络延迟影响</li>
                    <li>确认同步一致性</li>
                    <li>压力测试稳定性</li>
                </ul>
                <div class="test-badge">高级测试</div>
            </div>
            
            <div class="sync-card">
                <h3>⚡ 页面C特色功能</h3>
                <ul>
                    <li>实时同步监控</li>
                    <li>性能指标展示</li>
                    <li>冲突检测机制</li>
                    <li>延迟测量工具</li>
                </ul>
                <div class="test-badge">监控模式</div>
            </div>
        </div>
        
        <div class="sync-card">
            <h3>📊 实时同步日志</h3>
            <div id="syncLogger" class="real-time-log">
                初始化多页面同步监控...
            </div>
        </div>
        
        <div class="navigation">
            <a href="test_widget_sync.html" class="nav-link">🏠 页面A</a>
            <a href="test_widget_sync_b.html" class="nav-link">📱 页面B</a>
            <a href="test_transparent_widget.html" class="nav-link">🎨 透明测试</a>
        </div>
        
        <div style="text-align: center; margin: 30px 0;">
            <div class="test-badge">三页面同步</div>
            <div class="test-badge">实时监控</div>
            <div class="test-badge">性能分析</div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎯 挂件同步测试页面C已加载');
            
            const syncLogger = document.getElementById('syncLogger');
            let logEntries = [];
            
            function addLogEntry(type, message, data = null) {
                const timestamp = new Date().toLocaleTimeString();
                const entry = {
                    time: timestamp,
                    type: type,
                    message: message,
                    data: data
                };
                
                logEntries.unshift(entry);
                if (logEntries.length > 15) {
                    logEntries = logEntries.slice(0, 15);
                }
                
                updateLogDisplay();
                console.log(`🎯 页面C [${type}]:`, message, data || '');
            }
            
            function updateLogDisplay() {
                const logHTML = logEntries.map(entry => {
                    const typeColor = {
                        'INIT': '#3498db',
                        'SYNC': '#2ecc71',
                        'WIDGET': '#e74c3c',
                        'POSITION': '#f39c12',
                        'SIZE': '#9b59b6'
                    };
                    
                    return `<div style="color: ${typeColor[entry.type] || '#333'};">
                        [${entry.time}] ${entry.type}: ${entry.message}
                        ${entry.data ? `<br>   └── ${JSON.stringify(entry.data)}` : ''}
                    </div>`;
                }).join('');
                
                syncLogger.innerHTML = logHTML;
            }
            
            // 监控挂件状态
            let previousWidgetState = null;
            
            function checkWidgetState() {
                const container = document.querySelector('#styleswift-widget-container');
                const wrapper = container?.querySelector('.styleswift-widget-wrapper');
                
                if (wrapper) {
                    const currentState = {
                        position: {
                            x: parseInt(wrapper.style.left),
                            y: parseInt(wrapper.style.top)
                        },
                        size: {
                            width: wrapper.offsetWidth,
                            height: wrapper.offsetHeight
                        }
                    };
                    
                    if (!previousWidgetState) {
                        addLogEntry('WIDGET', '检测到挂件', currentState);
                        previousWidgetState = currentState;
                    } else {
                        // 检查位置变化
                        if (currentState.position.x !== previousWidgetState.position.x || 
                            currentState.position.y !== previousWidgetState.position.y) {
                            addLogEntry('POSITION', '位置同步', {
                                from: previousWidgetState.position,
                                to: currentState.position
                            });
                        }
                        
                        // 检查尺寸变化
                        if (currentState.size.width !== previousWidgetState.size.width || 
                            currentState.size.height !== previousWidgetState.size.height) {
                            addLogEntry('SIZE', '尺寸同步', {
                                from: previousWidgetState.size,
                                to: currentState.size
                            });
                        }
                        
                        previousWidgetState = currentState;
                    }
                } else if (previousWidgetState) {
                    addLogEntry('WIDGET', '挂件被移除');
                    previousWidgetState = null;
                }
            }
            
            // 定期检查挂件状态
            setInterval(checkWidgetState, 500);
            
            // 监听页面可见性变化
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    addLogEntry('SYNC', '页面重新激活，重新检查同步状态');
                    setTimeout(checkWidgetState, 100);
                }
            });
            
            // 添加浮动粒子效果
            function createFloatingParticle() {
                const particle = document.createElement('div');
                const colors = ['#3498db', '#e74c3c', '#f39c12', '#2ecc71', '#9b59b6'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.cssText = `
                    position: fixed;
                    width: 4px;
                    height: 4px;
                    background: ${color};
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 1000;
                    left: ${Math.random() * window.innerWidth}px;
                    top: ${window.innerHeight}px;
                    animation: floatUp ${8 + Math.random() * 4}s linear forwards;
                `;
                
                document.body.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 12000);
            }
            
            // 定期创建粒子
            setInterval(createFloatingParticle, 2000);
            
            // 添加上浮动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes floatUp {
                    to {
                        transform: translateY(-${window.innerHeight + 50}px) translateX(${Math.random() * 200 - 100}px);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
            
            // 初始化日志
            addLogEntry('INIT', '页面C多页面同步监控初始化完成');
            addLogEntry('SYNC', '开始监听三页面同步状态');
            
            // 模拟同步状态动画
            let syncAnimationStep = 0;
            setInterval(() => {
                const dots = document.querySelectorAll('.sync-dot');
                dots.forEach((dot, index) => {
                    if (index === syncAnimationStep % 3) {
                        dot.style.transform = 'scale(1.5)';
                        dot.style.opacity = '1';
                    } else {
                        dot.style.transform = 'scale(1)';
                        dot.style.opacity = '0.7';
                    }
                });
                syncAnimationStep++;
            }, 1000);
        });
    </script>
</body>
</html>
