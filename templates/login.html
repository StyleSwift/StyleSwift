<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleSwift - 登录/注册</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background-color: white;
            border-radius: 20px;
            padding: 32px;
            width: 340px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo img {
            width: 56px;
            height: 56px;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-color);
            margin: 12px 0;
        }
        .primary-btn {
            width: 100%;
            margin: 20px 0 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 20px 0 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        button:active {
            transform: scale(0.98);
        }
        .primary-btn {
            background-color: #8E49E7;
            color: white;
        }
        .primary-btn:hover {
            background-color: #721de1;
        }
        .signup-text {
            text-align: center;
            font-size: 14px;
            color: var(--light-text-color);
            margin: 10px 0;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #d2d2d7;
        }
        .divider span {
            padding: 0 16px;
            color: var(--light-text-color);
            font-size: 14px;
        }
        .social-login button {
            width: 100%;
            background-color: white;
            border: 1px solid #d2d2d7;
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 12px 0;
            padding: 14px;
        }
        .social-login button:hover {
            background-color: var(--secondary-color);
        }
        .social-login img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
        .forgot-password {
            display: block;
            text-align: center;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            margin: 20px 0;
        }
        .terms {
            text-align: center;
            font-size: 12px;
            color: var(--light-text-color);
            margin-top: 28px;
        }
        .terms a {
            color: var(--primary-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="../images/icon5.png" alt="StyleSwift Logo">
            <h1>一键美化器</h1>
        </div>
        <form>
            <input type="email" placeholder="请输入您的邮箱" required>
            <input type="password" placeholder="请输入您的密码" required>
            <button type="submit" class="primary-btn">登录 / 注册</button>
        </form>
        <p class="signup-text">首次登录将会自动注册</p>
        <div class="divider">
            <span>或</span>
        </div>
        <div class="social-login">
            <button>
                <img src="../static/pic/google.svg" alt="Google Icon">
                使用 Google 登录
            </button>
            <button>
                <img src="../static/pic/apple.svg" alt="Apple Icon">
                使用 Apple 登录
            </button>
            <button>
                <img src="../static/pic/facebook.svg" alt="Facebook Icon">
                使用 Facebook 登录
            </button>
        </div>
        <a href="#" class="forgot-password">忘记密码？</a>
        <p class="terms">注册即表示您同意 <a href="#">条款和条件</a> 和 <a href="#">隐私政策</a></p>
    </div>
</body>
</html>
