<style>
:root {
  --bongo-bg: #1a1e2d;
  --bongo-green: #a5ea9b;
  --bongo-pink: #ff61d8;
  --bongo-blue: #569cfa;
  --bongo-orange: #ffcc81;
  --bongo-cyan: #7ed1e2;
}

.bongo-container {
  width: 100%;
  height: 300px;
  background: var(--bongo-bg);
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
}

.bongo-container svg {
  height: 90%;
  width: 90%;
  overflow: visible;
}

#bongo-cat {
  fill: var(--bongo-bg);
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 4;
}

#bongo-cat .head {
  stroke: var(--bongo-orange);
  fill: var(--bongo-orange);
  opacity: 0.8;
}

#bongo-cat .paw {
  stroke: var(--bongo-orange);
  fill: var(--bongo-orange);
  opacity: 0.7;
}

#bongo-cat .table {
  stroke: var(--bongo-green);
  fill: var(--bongo-green);
  opacity: 0.6;
}

#bongo-cat .laptop-base {
  stroke: var(--bongo-blue);
  fill: var(--bongo-blue);
  opacity: 0.7;
}

#bongo-cat .music .note {
  stroke: var(--bongo-pink);
  fill: var(--bongo-pink);
}

.note-head {
  animation: note-bounce 0.6s ease-in-out infinite alternate;
}

.note-stem {
  stroke-width: 2;
}

.paw-right .up {
  animation: paw-tap-right 0.8s ease-in-out infinite;
}

.paw-left .up {
  animation: paw-tap-left 0.8s ease-in-out infinite;
  animation-delay: 0.4s;
}

@keyframes note-bounce {
  0% { transform: translateY(0px) scale(1); opacity: 1; }
  100% { transform: translateY(-20px) scale(1.2); opacity: 0.7; }
}

@keyframes paw-tap-right {
  0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
  50% { transform: translateY(-5px) rotate(5deg); opacity: 1; }
}

@keyframes paw-tap-left {
  0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
  50% { transform: translateY(-5px) rotate(-5deg); opacity: 1; }
}

.bongo-container:hover {
  transform: scale(1.05);
  transition: transform 0.3s ease;
}

.bongo-container:hover .note-head {
  animation-duration: 0.3s;
}

.bongo-container:hover .paw-right .up,
.bongo-container:hover .paw-left .up {
  animation-duration: 0.4s;
}
</style>

<script>
// 简化版Bongo Cat动画 - 不依赖外部库
(function() {
  console.log("Bongo Cat 挂件已加载！");
  
  // 获取挂件容器
  const container = document.querySelector('.bongo-container');
  if (!container) return;
  
  // 添加点击音效
  container.addEventListener('click', function() {
    // 使用Web Audio API创建简单音效
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      // 创建像敲鼓的音效
      oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
      
      gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.2);
    } catch (e) {
      console.log('音效播放失败:', e);
    }
  });
  
  // 添加随机音符动画
  let noteAnimationInterval;
  
  function startNoteAnimation() {
    const notes = container.querySelectorAll('.note');
    let noteIndex = 0;
    
    noteAnimationInterval = setInterval(() => {
      const note = notes[noteIndex % notes.length];
      if (note) {
        // 添加临时的强调动画
        note.style.animation = 'none';
        setTimeout(() => {
          note.style.animation = '';
        }, 50);
      }
      noteIndex++;
    }, 200);
  }
  
  function stopNoteAnimation() {
    if (noteAnimationInterval) {
      clearInterval(noteAnimationInterval);
      noteAnimationInterval = null;
    }
  }
  
  // 鼠标悬停时开始音符动画
  container.addEventListener('mouseenter', startNoteAnimation);
  container.addEventListener('mouseleave', stopNoteAnimation);
  
  // 启动基础动画
  startNoteAnimation();
})();
</script>
